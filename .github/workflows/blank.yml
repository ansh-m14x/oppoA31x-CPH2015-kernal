name: Import Official OPPO A31 Source

on:
  workflow_dispatch: # Allows you to click a button to start the import

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4

      - name: Download & Extract Source
        run: |
          # 1. Configure Git
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 2. Clone the official source (Only the kernel-4.9 part to save space)
          git clone --depth=1 https://github.com/oppo-source/A31.git official-repo
          
          # 3. Move the kernel files to the root of your current repo
          # This extracts the 'kernel-4.9' folder contents into your repo's root
          cp -r official-repo/kernel-4.9/* .
          rm -rf official-repo
          
      - name: Commit and Push to My Repo
        run: |
          git add .
          git commit -m "Imported official OPPO A31 kernel source" || echo "No changes to commit"
          git push origin main --force
