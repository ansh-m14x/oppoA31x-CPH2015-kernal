name: Build A31 Permissive Kernel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2 libxml2-utils lzop pngcrush rsync squashfs-tools xsltproc zip zlib1g-dev libncurses5-dev libssl-dev libncurses5

      - name: Download Source & Toolchains
        run: |
          git clone https://github.com/oppo-source/A31.git --depth=1 kernel-source
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth=1 clang
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32

      - name: Patch to Permissive
        run: |
          cd kernel-source/kernel-4.9
          
          # Patch defconfig
          CONF="arch/arm64/configs/oppo6765_defconfig"
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM=y" >> $CONF
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0" >> $CONF
          echo "CONFIG_SECURITY_SELINUX_DEVELOP=y" >> $CONF
          
          # Hardcode SELinux Permissive
          sed -i 's/static int selinux_enforcing = 1;/static int selinux_enforcing = 0;/g' security/selinux/hooks.c

      - name: Build Kernel
        run: |
          cd kernel-source/kernel-4.9
          
          # Setup paths
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/clang/clang-r*)
          export PATH=$CLANG_DIR/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Clean environment to prevent stale errors
          make O=out mrproper
          
          # Generate config
          make O=out CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- oppo6765_defconfig
          
          # Build only the core Image
          make O=out CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CC=clang CLANG_TRIPLE=aarch64-linux-gnu- Image.gz-dtb -j$(nproc --all)

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: A31-Permissive-Kernel
          path: kernel-source/kernel-4.9/out/arch/arm64/boot/Image.gz-dtb
